name: Java CI

# when to run CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  build:
    # what OS to run this on
    runs-on: ubuntu-latest

    # what steps will CI do 
    steps:
      # tells github to checkout our repo
      - name: Checkout Repo
        uses: actions/checkout@v4

      # setup Java toolchain for compilation
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # build java
      - name: Build
        run: make all

      # run java
      - name: Running Code
        run: make run
      
